name = "wkey/assignment"
version = "0.1.0"
description = '"Assignment for a position for w-key studios"'
authors = ['"Nikoals Silva Lunkes / Jedigunman"']
repository = "https://github.com/NikolasSilvaLunkes/WKEY-Take-Home-Assignment"
license = "MIT"

[target]
environment = "roblox"

[place]
shared = "game.ReplicatedStorage.Packages"
server = "game.ServerScriptService.Packages"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dependencies]
knit = { wally = "sleitnick/knit", version = "^1.7.0"}
vide = { wally = "centau/vide", version = "^0.3.1" }

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
